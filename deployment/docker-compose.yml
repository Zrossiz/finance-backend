name: finance

services:
  app:
    build:
      context: ../
      dockerfile: ./build/Dockerfile.local
    ports:
      - "9000:9000"
    volumes:
      - ../:/app
      - ../.air.toml:/app/.air.toml
      - go-mod:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping"]
      interval: 30s
      timeout: 10s

volumes:
  go-mod:
  postgres_data:
